services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        ENABLE_DETAILED_PROD_ERRORS: ${ENABLE_DETAILED_PROD_ERRORS:-false}
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      ENABLE_DETAILED_PROD_ERRORS: ${ENABLE_DETAILED_PROD_ERRORS:-false}
      OWNER_PASSWORD: ${OWNER_PASSWORD}
      USER_PASSWORD: ${USER_PASSWORD:-}
      XERO_CLIENT_ID: ${XERO_CLIENT_ID:-}
      XERO_CLIENT_SECRET: ${XERO_CLIENT_SECRET:-}
      XERO_REDIRECT_URI: ${XERO_REDIRECT_URI:-}
      XERO_SALES_ACCOUNT_CODE: ${XERO_SALES_ACCOUNT_CODE:-200}
      XERO_PURCHASES_ACCOUNT_CODE: ${XERO_PURCHASES_ACCOUNT_CODE:-300}
      XERO_SALES_TAX_TYPE: ${XERO_SALES_TAX_TYPE:-OUTPUT}
      XERO_PURCHASES_TAX_TYPE: ${XERO_PURCHASES_TAX_TYPE:-INPUT}
      XERO_PAYMENT_ACCOUNT_CODE: ${XERO_PAYMENT_ACCOUNT_CODE:-090}
      XERO_MCP_ENABLED: ${XERO_MCP_ENABLED:-false}
      XERO_MCP_COMMAND: ${XERO_MCP_COMMAND:-}
      XERO_MCP_SERVER_PATH: ${XERO_MCP_SERVER_PATH:-}
      XERO_MCP_ARGS: ${XERO_MCP_ARGS:-}
      INFOBIP_API_KEY: ${INFOBIP_API_KEY:-}
      INFOBIP_BASE_URL: ${INFOBIP_BASE_URL:-}
      INFOBIP_SMS_SENDER: ${INFOBIP_SMS_SENDER:-}
      INFOBIP_WHATSAPP_SENDER: ${INFOBIP_WHATSAPP_SENDER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SSL_PORT: ${SSL_PORT:-}
      TLS_PORT: ${TLS_PORT:-}
      USER_NAME: ${USER_NAME:-}
      PASSWORD: ${PASSWORD:-}
      CRON_SECRET: ${CRON_SECRET:-}
      BACKBLAZE_BUCKET_ENDPOINT: ${BACKBLAZE_BUCKET_ENDPOINT}
      BACKBLAZE_ACCESS_KEY_ID: ${BACKBLAZE_ACCESS_KEY_ID}
      BACKBLAZE_SECRET_ACCESS_KEY: ${BACKBLAZE_SECRET_ACCESS_KEY}
      BACKBLAZE_APPLICATION_BUCKETNAME: ${BACKBLAZE_APPLICATION_BUCKETNAME}
      BACKBLAZE_BUCKET_REGION: ${BACKBLAZE_BUCKET_REGION}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  default: {}
  dokploy-network:
    external: true
